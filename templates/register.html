<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Criar Conta</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/style.css') }}">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1>Criar Conta</h1>

<form
action="/register"
method="POST">

<input
type="text"
name="name"
placeholder="Nome completo"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Senha"
required>

<button>
Cadastrar
</button>

</form>

</div>

</div>

</body>
</html>
