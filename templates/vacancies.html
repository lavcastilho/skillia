<!DOCTYPE html>
<html>

<head>

    <title>Vagas - Skillia</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="sidebar">

    <h2>SKI</h2>

    <a href="/dashboard">Dashboard</a>
    <a href="/profile">Perfil</a>
    <a href="/vacancies">Vagas</a>
    <a href="/logout">Sair</a>

</div>

<div class="content">

    <h1>Vagas recomendadas para você</h1>

    <div class="vacancy-grid">

        {% for v in vacancies or [] %}

        <div class="vacancy-card">

            <h2>{{ v.title }}</h2>

            <p>{{ v.company }}</p>

            <div class="match">
                Match: {{ v.match or 0 }}%
            </div>

            <div class="bar">

                <!-- barra agora usa data-attribute (sem erro no VSCode) -->
                <div class="fill"
                     data-width="{{ v.match or 0 }}">
                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<!-- JS para aplicar a largura dinamicamente -->
<script>
document.querySelectorAll(".fill").forEach(el => {
    const value = el.getAttribute("data-width") || 0;
    el.style.width = value + "%";
});
</script>

</body>

</html>
